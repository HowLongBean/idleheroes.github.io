<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Tree Nodes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .table-container {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 20px;
        }
        .table-title {
            grid-column: 1 / span 2;
            grid-row: 1;
        }
        .tree-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .tree-title {
            grid-column: 1 / span 2;
            grid-row: 1;
        }
        .branch {
            margin: 10px 0;
            padding: 8px;
            background-color: #e8f4f8;
            border-left: 4px solid #4CAF50;
            border-radius: 3px;
        }
        .branch-title {
            font-weight: bold;
            font-size: 14px;
            color: #4CAF50;
            margin-bottom: 8px;
        }
        .node {
            margin: 5px 0;
            padding: 6px 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .node input[type="checkbox"] {
            cursor: pointer;
        }
        .node-label {
            flex: 1;
            cursor: pointer;
        }
        .node-label.shared {
            font-weight: bold;
            color: #ff9800;
        }
        .totals {
            margin-top: 10px;
            padding: 10px;
            background-color: #fff3cd;
            border-radius: 3px;
        }
        .total {
            font-weight: bold;
            margin: 5px 0;
            color: #333;
        }
        .overall-total {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            background-color: #d4edda;
            border: 2px solid #28a745;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Interactive Tree Nodes - v99.0.1</h1>
    <div id="tablesContainer"></div>
    <div id="overallTotalDiv" class="overall-total">Overall Total: 0</div>

    <script>
        const totalLimit = 66;
        let overallTotal = 0;
        const treeData = [];

        // Node labels configuration - easy to modify
        const nodeLabels = [
            'Root', 'Branch Start', 'Key Node',
            'Node 4', 'Node 5', 'Node 6', 'Node 7', 'Node 8', 'Node 9', 'Node 10', 'Node 11', 'Node 12'
        ];

        function createNode(nodeIndex, tableIndex, treeIndex, branchIndex, isShared = false) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            
            // Set deterministic values: nodes 1-11 = 1, node 12 = 2
            const value = (nodeIndex < 11) ? 1 : 2;
            const nodeId = `node_${tableIndex}_${treeIndex}_${branchIndex}_${nodeIndex}`;
            const label = nodeLabels[nodeIndex] || `Node ${nodeIndex + 1}`;
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = nodeId;
            checkbox.value = value;
            checkbox.dataset.value = value;
            // identify node position and shared flag
            checkbox.dataset.nodeIndex = nodeIndex;
            checkbox.dataset.branchIndex = branchIndex;
            checkbox.dataset.treeIndex = treeIndex;
            checkbox.dataset.tableIndex = tableIndex;
            // unique tree id across tables
            checkbox.dataset.treeUid = `${tableIndex}_${treeIndex}`;
            if (isShared) checkbox.dataset.shared = 'true';

            const labelSpan = document.createElement('span');
            labelSpan.className = 'node-label' + (isShared ? ' shared' : '');
            labelSpan.textContent = `${label} (${value}pts)`;
            labelSpan.title = isShared ? 'Shared node (applies to all branches)' : '';

            checkbox.addEventListener('change', function(e) {
                // If this is a shared node, propagate the checked state to other shared nodes with same nodeIndex
                if (isShared) {
                    // propagate only to shared nodes in the same tree (the 2 branches of this tree)
                    const selector = `input[type="checkbox"][data-shared="true"][data-node-index="${nodeIndex}"][data-tree-uid="${tableIndex}_${treeIndex}"]`;
                    document.querySelectorAll(selector).forEach(cb => {
                        if (cb !== this) cb.checked = this.checked;
                    });
                }

                // Enforce ordering within this branch and any affected branches (for shared nodes)
                if (isShared) {
                    // enforce all branches containing this shared node
                    const selector = `div.branch`;
                    document.querySelectorAll(selector).forEach(branch => enforceOrderForBranch(branch));
                } else {
                    const branchDiv = this.closest('.branch');
                    enforceOrderForBranch(branchDiv);
                }

                updateTotal(e);
            });

            nodeDiv.appendChild(checkbox);
            nodeDiv.appendChild(labelSpan);
            
            return nodeDiv;
        }

        function createBranch(branchIndex, tableIndex, treeIndex) {
            const branchDiv = document.createElement('div');
            branchDiv.className = 'branch';
            
            const branchTitle = document.createElement('div');
            branchTitle.className = 'branch-title';
            branchTitle.textContent = `Branch ${branchIndex + 1}`;
            branchDiv.appendChild(branchTitle);

            // Add 12 nodes per branch
            // First 3 are shared
            for (let i = 0; i < 12; i++) {
                const isShared = i < 3;
                branchDiv.appendChild(createNode(i, tableIndex, treeIndex, branchIndex, isShared));
            }

            // enforce ordering initially for this branch
            enforceOrderForBranch(branchDiv);

            return branchDiv;
        }

        // Enforce that a node can only be enabled if the previous node is checked
        function enforceOrderForBranch(branchDiv) {
            if (!branchDiv) return;
            const checkboxes = Array.from(branchDiv.querySelectorAll('.node input[type="checkbox"]'));
            checkboxes.forEach((cb, idx) => {
                if (idx === 0) {
                    cb.disabled = false;
                } else {
                    const prev = checkboxes[idx - 1];
                    if (prev && prev.checked) {
                        cb.disabled = false;
                    } else {
                        // if previous is not checked, disable and uncheck this one
                        cb.checked = false;
                        cb.disabled = true;
                    }
                }
            });
        }

        function createTree(treeIndex, tableIndex) {
            const treeDiv = document.createElement('div');
            treeDiv.className = 'tree-container';
            
            const treeTitle = document.createElement('div');
            treeTitle.className = 'tree-title';
            treeTitle.textContent = `Tree ${treeIndex + 1}`;
            treeDiv.appendChild(treeTitle);

            // Add 2 branches per tree
            for (let i = 0; i < 2; i++) {
                treeDiv.appendChild(createBranch(i, tableIndex, treeIndex));
            }

            return treeDiv;
        }

        function createTable(tableIndex) {
            const tableDiv = document.createElement('div');
            tableDiv.className = 'table-container';
            
            const tableTitle = document.createElement('div');
            tableTitle.className = 'table-title';
            tableTitle.textContent = `Table ${tableIndex + 1}`;
            tableDiv.appendChild(tableTitle);

            // Add 3 trees per table
            for (let i = 0; i < 3; i++) {
                tableDiv.appendChild(createTree(i, tableIndex));
            }

            const tableTotal = document.createElement('div');
            tableTotal.className = 'totals';
            tableTotal.id = `tableTotal_${tableIndex}`;
            tableTotal.innerHTML = `<div class="total">Table Total: 0</div>`;
            tableDiv.appendChild(tableTotal);

            return tableDiv;
        }

        function updateTotal(e) {
            overallTotal = 0;
            const seenShared = new Set();
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            checkboxes.forEach(checkbox => {
                const isShared = checkbox.dataset && checkbox.dataset.shared === 'true';
                if (isShared) {
                    const key = `${checkbox.dataset.treeUid}_${checkbox.dataset.nodeIndex}`;
                    if (seenShared.has(key)) return; // already counted this shared node for this tree
                    seenShared.add(key);
                }
                overallTotal += parseInt(checkbox.dataset.value, 10) || 0;
            });

            if (overallTotal > totalLimit) {
                alert(`Total exceeds limit of ${totalLimit}!`);
                // revert the triggering change if available
                if (e && e.target) {
                    e.target.checked = false;
                    // if shared, revert other shared nodes with same nodeIndex in the same tree
                    if (e.target.dataset && e.target.dataset.shared === 'true') {
                        const nodeIdx = e.target.dataset.nodeIndex;
                        const treeUid = e.target.dataset.treeUid;
                        const selector = `input[type="checkbox"][data-shared="true"][data-node-index="${nodeIdx}"][data-tree-uid="${treeUid}"]`;
                        document.querySelectorAll(selector).forEach(cb => {
                            if (cb !== e.target) cb.checked = false;
                        });
                    }
                }

                // Recompute totals after revert (respecting shared uniqueness)
                overallTotal = 0;
                const seenAfterRevert = new Set();
                document.querySelectorAll('input[type="checkbox"]:checked').forEach(checkbox => {
                    const isShared = checkbox.dataset && checkbox.dataset.shared === 'true';
                    if (isShared) {
                        const key = `${checkbox.dataset.treeUid}_${checkbox.dataset.nodeIndex}`;
                        if (seenAfterRevert.has(key)) return;
                        seenAfterRevert.add(key);
                    }
                    overallTotal += parseInt(checkbox.dataset.value, 10) || 0;
                });
                document.getElementById('overallTotalDiv').textContent = `Overall Total: ${overallTotal}`;
                return;
            }

            // Update overall total
            document.getElementById('overallTotalDiv').textContent = `Overall Total: ${overallTotal}`;
        }

        // Create 3 tables
        const container = document.getElementById('tablesContainer');
        for (let i = 0; i < 3; i++) {
            container.appendChild(createTable(i));
        }
    </script>
</body>
</html>
