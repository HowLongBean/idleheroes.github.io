<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9 Trees with Node Selection</title>
</head>
<body>
    <h1>9 Trees with Node Selection</h1>
    <div id="trees">
        <!-- Trees will be generated here -->
    </div>
    <script>
        function createTrees() {
            const container = document.getElementById('trees');
            for (let i = 0; i < 9; i++) {
                const treeDiv = document.createElement('div');
                treeDiv.className = 'tree';
                treeDiv.innerHTML = `<h3>Tree ${i + 1}</h3>`;
                for (let j = 0; j < 24; j++) {
                    const nodeValue = Math.floor(Math.random() * 10) + 1; // Random value between 1 and 10
                    const checkbox = `<input type="checkbox" onchange="updateTotal(this, ${nodeValue})"> Node Value: ${nodeValue}`;
                    treeDiv.innerHTML += `<div>${checkbox}</div>`;
                }
                container.appendChild(treeDiv);
            }
        }

        function updateTotal(checkbox, value) {
            // Implement logic to ensure the total does not exceed 66
        }

        createTrees();
    </script>
</body>
</html>
